<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Login - Secure Portfolio Management">
    <title>Admin Login | Portfolio</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow-x: hidden;
        }

        /* ========================================
           BACKGROUND ANIMATION
           ======================================== */

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }

        .circle-1 {
            width: 300px;
            height: 300px;
            background: white;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .circle-2 {
            width: 200px;
            height: 200px;
            background: white;
            bottom: -50px;
            right: -50px;
            animation-delay: 5s;
        }

        .circle-3 {
            width: 250px;
            height: 250px;
            background: white;
            top: 50%;
            right: 10%;
            animation-delay: 10s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(30px);
            }
        }

        /* ========================================
           LOGIN CONTAINER
           ======================================== */

        .login-container {
            width: 100%;
            max-width: 480px;
            z-index: 1;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========================================
           LOGIN CARD
           ======================================== */

        .login-card {
            background: white;
            border-radius: 20px;
            padding: 3rem 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* ========================================
           LOGIN HEADER
           ======================================== */

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeInDown 0.6s ease-out 0.2s backwards;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-icon-wrapper {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7);
            }

            50% {
                box-shadow: 0 0 0 15px rgba(102, 126, 234, 0);
            }
        }

        .login-icon-wrapper i {
            font-size: 2.5rem;
            color: white;
        }

        .login-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .login-header p {
            color: #64748b;
            font-size: 0.95rem;
            margin: 0;
            font-weight: 400;
        }

        /* ========================================
           FORM ELEMENTS
           ======================================== */

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            animation: fadeInUp 0.6s ease-out 0.3s backwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .form-group label {
            font-weight: 600;
            color: #1e293b;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }

        .form-group input {
            padding: 1rem 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #f8fafc;
            color: #1e293b;
        }

        .form-group input::placeholder {
            color: #cbd5e1;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .form-group input:valid {
            border-color: #10b981;
        }

        /* ========================================
           REMEMBER ME & FORGOT PASSWORD
           ======================================== */

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0.5rem 0 1.5rem;
            animation: fadeInUp 0.6s ease-out 0.4s backwards;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .remember-me label {
            cursor: pointer;
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 400;
            margin: 0;
        }

        .forgot-password {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .forgot-password:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        /* ========================================
           BUTTONS
           ======================================== */

        .submit-btn {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
            font-family: 'Poppins', sans-serif;
            letter-spacing: 0.5px;
            animation: fadeInUp 0.6s ease-out 0.5s backwards;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.5);
        }

        .submit-btn:active:not(:disabled) {
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .submit-btn.loading {
            position: relative;
            color: transparent;
        }

        .submit-btn.loading::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            top: 50%;
            left: 50%;
            margin-left: -9px;
            margin-top: -9px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ========================================
           MESSAGES
           ======================================== */

        .message {
            padding: 1rem 1.2rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: none;
            animation: slideDown 0.3s ease-out;
            border-left: 4px solid;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d1fae5;
            color: #059669;
            border-left-color: #059669;
        }

        .message.error {
            background: #fee2e2;
            color: #dc2626;
            border-left-color: #dc2626;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========================================
           DIVIDER
           ======================================== */

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            animation: fadeInUp 0.6s ease-out 0.6s backwards;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .divider span {
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* ========================================
           FOOTER
           ======================================== */

        .login-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #e2e8f0;
            animation: fadeInUp 0.6s ease-out 0.7s backwards;
        }

        .login-footer p {
            color: #64748b;
            font-size: 0.9rem;
            margin: 0;
        }

        .login-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .login-footer a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        /* ========================================
           BACK BUTTON
           ======================================== */

        .back-btn {
            position: absolute;
            top: 2rem;
            left: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
            font-size: 1.2rem;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-5px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        /* ========================================
           RESPONSIVE DESIGN
           ======================================== */

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }

            .login-card {
                padding: 2rem 1.5rem;
            }

            .login-header h1 {
                font-size: 1.5rem;
            }

            .form-footer {
                flex-direction: column;
                align-items: stretch;
            }

            .forgot-password {
                text-align: center;
            }

            .login-icon-wrapper {
                width: 70px;
                height: 70px;
            }

            .login-icon-wrapper i {
                font-size: 2rem;
            }

            .back-btn {
                width: 45px;
                height: 45px;
                font-size: 1rem;
                top: 1.5rem;
                left: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 1.5rem 1.2rem;
            }

            .login-header {
                margin-bottom: 1.5rem;
            }

            .login-header h1 {
                font-size: 1.3rem;
            }

            .form-group input {
                padding: 0.9rem 1rem;
                font-size: 16px;
            }

            .submit-btn {
                padding: 0.9rem 1.5rem;
            }

            .bg-circle {
                display: none;
            }
        }
    </style>
</head>

<body>
    <!-- Background Animation -->
    <div class="bg-animation">
        <div class="bg-circle circle-1"></div>
        <div class="bg-circle circle-2"></div>
        <div class="bg-circle circle-3"></div>
    </div>

    <!-- Back Button -->
    <a href="../index.html" class="back-btn" title="Back to home">
        <i class="fas fa-arrow-left"></i>
    </a>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <div class="login-icon-wrapper">
                    <i class="fas fa-lock"></i>
                </div>
                <h1>Admin Access</h1>
                <p>Sign in to manage your portfolio</p>
            </div>

            <!-- Message -->
            <div class="message" id="message"></div>

            <!-- Form -->
            <form id="login-form" class="login-form">
                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required
                        autocomplete="email">
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required
                        autocomplete="current-password">
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="form-footer">
                    <div class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="#" class="forgot-password"
                        onclick="alert('Contact admin to reset password'); return false;">
                        Forgot password?
                    </a>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn" id="submitBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span>🔒 Secure Login</span>
            </div>

            <!-- Footer -->
            <div class="login-footer">
                <p>
                    <i class="fas fa-shield-alt"></i>
                    Protected Admin Area • All data encrypted
                </p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ========================================
        // CONFIGURATION
        // ========================================

        const SUPABASE_CONFIG = {
            URL: 'https://qpevxichqzeuqswvacqa.supabase.co',
            ANON_KEY: 'sb_publishable_pz9O2PocfjwdFNSlkfnAtw_Hni6wFAh'
        };

        const supabaseClient = window.supabase.createClient(
            SUPABASE_CONFIG.URL,
            SUPABASE_CONFIG.ANON_KEY
        );

        // ========================================
        // LOGIN HANDLER
        // ========================================

        class LoginPage {
            constructor() {
                this.form = document.getElementById('login-form');
                this.emailInput = document.getElementById('email');
                this.passwordInput = document.getElementById('password');
                this.rememberCheckbox = document.getElementById('remember');
                this.submitBtn = document.getElementById('submitBtn');
                this.messageDiv = document.getElementById('message');

                this.init();
            }

            init() {
                this.form.addEventListener('submit', (e) => this.handleLogin(e));
                this.loadSavedCredentials();
                this.setupInputValidation();
            }

            async handleLogin(e) {
                e.preventDefault();

                const email = this.emailInput.value.trim();
                const password = this.passwordInput.value;

                if (!this.validateForm(email, password)) {
                    return;
                }

                this.setLoadingState(true);
                this.hideMessage();

                try {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({
                        email,
                        password
                    });

                    if (error) {
                        throw error;
                    }

                    // Save credentials if remember me is checked
                    if (this.rememberCheckbox.checked) {
                        this.saveCredentials(email);
                    } else {
                        this.clearSavedCredentials();
                    }
                    this.showMessage('✓ Login successful! Redirecting...', 'success');



                    // Redirect after short delay
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);

                } catch (error) {
                    console.error('Login error:', error);
                    this.showMessage(
                        error.message || 'Login failed. Please check your credentials.',
                        'error'
                    );
                    this.setLoadingState(false);
                }
            }

            validateForm(email, password) {
                this.hideMessage();

                if (!email) {
                    this.showMessage('Please enter your email address', 'error');
                    this.emailInput.focus();
                    return false;
                }

                if (!this.isValidEmail(email)) {
                    this.showMessage('Please enter a valid email address', 'error');
                    this.emailInput.focus();
                    return false;
                }

                if (!password) {
                    this.showMessage('Please enter your password', 'error');
                    this.passwordInput.focus();
                    return false;
                }

                if (password.length < 6) {
                    this.showMessage('Password must be at least 6 characters', 'error');
                    this.passwordInput.focus();
                    return false;
                }

                return true;
            }

            isValidEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            }

            setLoadingState(isLoading) {
                this.submitBtn.disabled = isLoading;

                if (isLoading) {
                    this.submitBtn.classList.add('loading');
                    this.submitBtn.textContent = '';
                } else {
                    this.submitBtn.classList.remove('loading');
                    this.submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                }

                this.emailInput.disabled = isLoading;
                this.passwordInput.disabled = isLoading;
            }

            showMessage(message, type) {
                this.messageDiv.textContent = message;
                this.messageDiv.className = `message ${type} show`;
            }

            hideMessage() {
                this.messageDiv.classList.remove('show');
            }

            saveCredentials(email) {
                localStorage.setItem('saved_email', email);
                localStorage.setItem('remember_me', 'true');
            }

            clearSavedCredentials() {
                localStorage.removeItem('saved_email');
                localStorage.removeItem('remember_me');
            }

            loadSavedCredentials() {
                const savedEmail = localStorage.getItem('saved_email');
                const rememberMe = localStorage.getItem('remember_me') === 'true';

                if (savedEmail && rememberMe) {
                    this.emailInput.value = savedEmail;
                    this.rememberCheckbox.checked = true;
                    this.passwordInput.focus();
                }
            }

            setupInputValidation() {
                this.emailInput.addEventListener('blur', () => {
                    if (this.emailInput.value && !this.isValidEmail(this.emailInput.value)) {
                        this.emailInput.style.borderColor = '#dc2626';
                    } else {
                        this.emailInput.style.borderColor = '';
                    }
                });

                this.passwordInput.addEventListener('blur', () => {
                    if (this.passwordInput.value && this.passwordInput.value.length < 6) {
                        this.passwordInput.style.borderColor = '#dc2626';
                    } else {
                        this.passwordInput.style.borderColor = '';
                    }
                });

                this.emailInput.addEventListener('input', () => this.hideMessage());
                this.passwordInput.addEventListener('input', () => this.hideMessage());
            }
        }

        // ========================================
        // INITIALIZE
        // ========================================

        document.addEventListener('DOMContentLoaded', () => {
            new LoginPage();
            console.log('✅ Login page ready');
        });
    </script>
</body>

</html>
