<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Login - Secure Portfolio Management">
    <title>Admin Login | Portfolio</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            padding: 2.5rem 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-icon {
            width: 70px;
            height: 70px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
        }

        .login-header h1 {
            font-size: 1.8rem;
            color: #1e293b;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .login-header p {
            color: #64748b;
            font-size: 0.95rem;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-weight: 600;
            color: #1e293b;
            font-size: 0.95rem;
        }

        .form-group input {
            padding: 0.9rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s ease;
            background: #f8fafc;
        }

        .form-group input::placeholder {
            color: #cbd5e1;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0.5rem 0 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .remember-me label {
            cursor: pointer;
            color: #64748b;
            font-size: 0.9rem;
            margin: 0;
            font-weight: 400;
        }

        .forgot-password {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .forgot-password:hover {
            color: #764ba2;
        }

        .submit-btn {
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .submit-btn.loading {
            position: relative;
            color: transparent;
        }

        .submit-btn.loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            top: 50%;
            left: 50%;
            margin-left: -8px;
            margin-top: -8px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            padding: 0.9rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            border-left: 4px solid;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d1fae5;
            color: #059669;
            border-left-color: #059669;
        }

        .message.error {
            background: #fee2e2;
            color: #dc2626;
            border-left-color: #dc2626;
        }

        .back-btn {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 1rem;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-3px);
        }

        .demo-credentials {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f0f4ff;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #475569;
            text-align: center;
        }

        .demo-credentials strong {
            color: #667eea;
            font-weight: 600;
        }

        @media (max-width: 640px) {
            .login-card {
                padding: 1.5rem 1.2rem;
            }

            .login-header h1 {
                font-size: 1.5rem;
            }

            .form-footer {
                flex-direction: column;
                align-items: stretch;
            }

            .forgot-password {
                text-align: center;
            }

            .login-icon {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }

            .back-btn {
                width: 40px;
                height: 40px;
                font-size: 0.9rem;
                top: 1rem;
                left: 1rem;
            }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 1.2rem 1rem;
            }

            .login-header {
                margin-bottom: 1.5rem;
            }

            .form-group input {
                font-size: 16px;
                padding: 0.8rem 0.9rem;
            }

            .submit-btn {
                padding: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-btn" title="Back to home">
        <i class="fas fa-arrow-left"></i>
    </a>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <i class="fas fa-lock"></i>
                </div>
                <h1>Admin Login</h1>
                <p>Manage your portfolio</p>
            </div>

            <div class="message" id="message"></div>

            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="admin@example.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <div class="form-footer">
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="javascript:void(0)" class="forgot-password" onclick="alert('Please contact the admin for password reset'); return false;">
                        Forgot password?
                    </a>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    Sign In
                </button>
            </form>
        </div>
    </div>
<!-- SUPABASE CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // ========================================
    // SUPABASE CONFIG
    // ========================================

    const SUPABASE_URL = 'https://qpevxichqzeuqswvacqa.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pz9O2PocfjwdFNSlkfnAtw_Hni6wFAh';

    const supabaseClient = supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY
    );

    window.supabaseClient = supabaseClient;

    // LOGIN CLASS
    class LoginPage {

        constructor() {

            this.form = document.getElementById('login-form');
            this.emailInput = document.getElementById('email');
            this.passwordInput = document.getElementById('password');
            this.rememberCheckbox = document.getElementById('remember');
            this.submitBtn = document.getElementById('submitBtn');
            this.messageDiv = document.getElementById('message');

            this.init();
        }

        async init() {

            await this.checkAuth();

            this.form.addEventListener(
                'submit',
                (e) => this.handleLogin(e)
            );
        }

        // ========================================
        // CHECK AUTH
        // ========================================

        async checkAuth() {

            try {

                const {
                    data: { session }
                } = await supabaseClient.auth.getSession();

                if (session) {

                    console.log('✅ Already logged in');

                    window.location.href = 'dashboard.html';
                }

            } catch (error) {

                console.error(error);
            }
        }

        // ========================================
        // HANDLE LOGIN
        // ========================================

        async handleLogin(e) {

            e.preventDefault();

            const email = this.emailInput.value.trim();
            const password = this.passwordInput.value;

            this.setLoadingState(true);

            try {

                const {
                    data,
                    error
                } = await supabaseClient.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;

                console.log('✅ Login success');

                this.showMessage(
                    '✅ Login successful!',
                    'success'
                );

                setTimeout(() => {

                    window.location.href = 'dashboard.html';

                }, 1000);

            } catch (error) {

                console.error(error);

                this.showMessage(
                    error.message || 'Login failed',
                    'error'
                );

            } finally {

                this.setLoadingState(false);
            }
        }

        // ========================================
        // MESSAGE
        // ========================================

        showMessage(message, type) {

            this.messageDiv.textContent = message;

            this.messageDiv.className =
                `message ${type} show`;

            if (type === 'error') {

                setTimeout(() => {

                    this.messageDiv.classList.remove('show');

                }, 4000);
            }
        }

        // ========================================
        // LOADING
        // ========================================

        setLoadingState(isLoading) {

            this.submitBtn.disabled = isLoading;

            if (isLoading) {

                this.submitBtn.classList.add('loading');
                this.submitBtn.textContent = '';

            } else {

                this.submitBtn.classList.remove('loading');
                this.submitBtn.textContent = 'Sign In';
            }

            this.emailInput.disabled = isLoading;
            this.passwordInput.disabled = isLoading;
        }
    }

    // ========================================
    // INIT
    // ========================================

    document.addEventListener('DOMContentLoaded', () => {

        new LoginPage();

        console.log('✅ Login Page Ready');
    });
</script>
   
</body>
</html>
